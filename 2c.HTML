<!DOCTYPE html>
<html>
<head>
<title>Registration form</title>
</head>
</body>
<h1 align="center">Registration form</h1>
<from action="#"method="post">
<table border="1"cellpadding="10"cellspacing="5"align="center">
<tr>
<th colspan="2">Registration Details</th>
</tr>
<tr>
<td>Full Name:</td>
<td>
<input type="text"name"placeholder="enter your name">
</td>
</tr>
<tr>
<td>Password:</td>
<td>
<input type="password"name="password">
</td>
</tr>
<tr>
<td> Age:</td>
<td>
<input type="number"name="age">
</td>
</tr>
<tr>
<td>date of birth:</td>
<td>
<input type="date"name="dob>
</td>
</tr>
<tr>
<td>Gender:</td>
<td>
<input type="radio"name="Gender"value = "male">male
<input type="radio"name="Gender"value = "female"> female
</td>
</tr>
<tr>
<td>Hobbies:</td>
<td>
<input type="checkbox"name="hobby 1"value="reading">reading
<input type="checkbox"name="hobby 2"value="sports">sports
<input type="checkbox"name="hobby 1"value="music">music
</td>
</tr>
<tr>
<td>country:</td>
<td>
<select name="country">
<option>select country</option>
<option>India </option>
option>USA</option>
option>UK</option>
</select>
</td>
</tr>
<tr>
<td>Address:</td>
<td>
<textareaname = "address"rows="4"cols = "20">/textarea>
</td>
</tr>
<tr>
<td colspan="2"align="center">
<input type="submit"value="submit">
<input type="reset" value="reset">
</td>
</tr>
</table>
</form>
</body>
</html>
