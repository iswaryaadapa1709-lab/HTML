<!DOCTYPE html>
<html>
<head>
 <title>JavaScript Functions and Events</title>
 <script>
 function calculate() {
 let n = parseInt(document.getElementById("num").value);
 let output = "";
 // Factorial
 function factorial(n) {
 let fact = 1;
 for (let i = 1; i <= n; i++) {
 fact *= i;
 }
 return fact;
 }
 // Fibonacci
 function fibonacci(n) {
 let a = 0, b = 1;
 let series = "";
 while (a <= n) {
 series += a + " ";
 let temp = a + b;
 a = b;
 b = temp;
 }
 return series;
 }
 // Prime Numbers
 function primes(n) {
 let primeList = "";
 for (let i = 2; i <= n; i++) {
 let isPrime = true;
 for (let j = 2; j <= Math.sqrt(i); j++) {
 if (i % j == 0) {
 isPrime = false;
 break;
 }
 }
 if (isPrime) {
 primeList += i + " ";
 }
 }
 return primeList;
 }
 // Palindrome
 function isPalindrome(n) {
 let original = n.toString();
 let reversed = original.split("").reverse().join("");
 return original === reversed;
 }
 output += "<b>Factorial:</b> " + factorial(n) + "<br>";
 output += "<b>Fibonacci Series:</b> " + fibonacci(n) + "<br>";
 output += "<b>Prime Numbers:</b> " + primes(n) + "<br>";
 output += "<b>Palindrome:</b> " + (isPalindrome(n) ? "Yes" : "No");
 document.getElementById("result").innerHTML = output;
 }
 </script>
</head>
<body>
 <h2>JavaScript Functions and Events</h2>
 Enter a Number:
 <input type="number" id="num">
 <button onclick="calculate()">Submit</button>
 <h3>Result:</h3>
 <div id="result"></div>
</body>
</html>
